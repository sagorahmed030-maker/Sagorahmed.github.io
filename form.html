<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Form</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#220033,#6a0dad,#ff0080);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    width:90%;
    max-width:500px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}
h2{
    text-align:center;
    margin-bottom:25px;
    color:#6a0dad;
}
input,textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    background:#6a0dad;
    color:white;
    font-size:17px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#ff0080;
}
</style>
</head>
<body>

<div class="box">
    <h2>Visitor Information</h2>

   <form action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="411e68d8-d4fa-4709-bf1c-eafae9046dfd">
  <input type="text" name="name" required>
  <input type="email" name="email" required>
  <textarea name="message" required></textarea>
  <button type="submit">Submit</button>
</form>
</div>

</body>
</html>
