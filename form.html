<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Form</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#220033,#6a0dad,#ff0080);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    width:90%;
    max-width:500px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}
h2{
    text-align:center;
    margin-bottom:25px;
    color:#6a0dad;
}
input,textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    background:#6a0dad;
    color:white;
    font-size:17px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#ff0080;
}
</style>
</head>
<body>

<div class="box">
    <h2>Visitor Information</h2>

   <form action="https://api.web3forms.com/submit" method="POST">

        <input type="text" name="Name" placeholder="Your Name" required>

        <input type="email" name="Email" placeholder="Your Email" required>

        <input type="text" name="Phone" placeholder="Phone Number">

        <textarea name="Message" rows="5" placeholder="Write Message"></textarea>

        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Visitor From Portfolio">
        <input type="hidden" name="_next" value="https://sagorahmed030-maker.github.io/index/thankyou.html">

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
